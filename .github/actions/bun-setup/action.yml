name: Bun setup + install
description: >-
  Install Bun (pinned via .bun-version), restore the Bun install cache, and run
  a frozen-lockfile install (`bun ci`). Shared by every workflow job that needs
  the JS/TS workspace dependencies. Assumes the repo is already checked out.

runs:
  using: composite
  steps:
    - name: Set up Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      with:
        bun-version-file: .bun-version

    - name: Cache Bun install
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install dependencies
      shell: bash
      run: bun ci
