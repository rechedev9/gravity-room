name: Go CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/go-api/**'
      - 'Dockerfile.api'

concurrency:
  group: go-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/go-api/go.mod
          cache-dependency-path: apps/go-api/go.sum

      - name: Go vet
        working-directory: apps/go-api
        run: go vet ./...

      - name: Go lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4
          working-directory: apps/go-api

      - name: Go test
        working-directory: apps/go-api
        run: go test ./...

  integration:
    uses: ./.github/workflows/_go-integration.yml

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-test, integration]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        # Build-only validation — runtime tests happen in the integration job
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.api
          push: false
          build-args: VITE_API_URL=http://localhost:3001
          tags: gravity-room-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
