name: Dependabot Bun lockfile sync

on:
  pull_request:
    branches: [main]

jobs:
  sync-lockfile:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout PR branch
        if: steps.meta.outputs.package-ecosystem == 'npm_and_yarn'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        if: steps.meta.outputs.package-ecosystem == 'npm_and_yarn'
        with:
          bun-version: latest

      - name: Update bun.lock
        if: steps.meta.outputs.package-ecosystem == 'npm_and_yarn'
        run: bun install --no-frozen-lockfile --ignore-scripts

      - name: Commit and push if changed
        if: steps.meta.outputs.package-ecosystem == 'npm_and_yarn'
        run: |
          if git diff --quiet bun.lock; then
            echo "bun.lock unchanged"
            exit 0
          fi
          git config user.name "dependabot[bot]"
          git config user.email "49699333+dependabot[bot]@users.noreply.github.com"
          git add bun.lock
          git commit -m "chore(deps): sync bun.lock"
          git push
