name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly dependency/SAST drift check.
    - cron: '23 4 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}

  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout current tree
        uses: actions/checkout@v5

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.0 dir /repo \
            --redact \
            --no-banner \
            --exit-code=1 \
            --report-format=sarif \
            --report-path=/repo/gitleaks.sarif

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run Semgrep
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            semgrep/semgrep:1.145.0 \
            semgrep scan \
            --config p/owasp-top-ten \
            --config p/typescript \
            --config p/python \
            --error \
            --sarif \
            --output semgrep.sarif \
            --exclude docs/superpowers \
            --exclude presentation

      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Audit JS dependencies
        run: bun audit --audit-level=low

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Audit Python analytics dependencies
        run: |
          uvx --no-env-file pip-audit \
            -r apps/backend/analytics/requirements.txt \
            -r apps/backend/analytics/requirements-dev.txt

  security-header-contract:
    name: Security header contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version

      - name: Check production headers
        run: bun run security:headers
