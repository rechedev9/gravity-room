name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly dependency/SAST drift check.
    - cron: '23 4 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: /language:${{ matrix.language }}

  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout full history
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # Gitleaks git mode reads the commit graph; full history is required
          # to detect secrets that were committed and later removed.
          fetch-depth: 0

      - name: Run Gitleaks
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          # Scan git history (not just the working tree) so removed-but-recoverable
          # secrets are caught. On pull_request, scope to the PR's commit range so
          # pre-existing historical commits aren't re-flagged; on push/schedule
          # scan the full history.
          LOG_OPTS=""
          if [ "$EVENT_NAME" = "pull_request" ]; then
            LOG_OPTS="--log-opts=${PR_BASE_SHA}..${PR_HEAD_SHA}"
          fi
          # --config is REQUIRED: gitleaks runs with the container CWD at `/`,
          # not the mounted `/repo`, so it cannot auto-discover the repo's
          # .gitleaks.toml. Without this, the project allowlist is ignored and
          # the scan re-flags long-lived false positives (the public IndexNow
          # key, fake-JWT test fixtures), failing every push to main.
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.0 git /repo \
            --config=/repo/.gitleaks.toml \
            $LOG_OPTS \
            --redact \
            --no-banner \
            --exit-code=1 \
            --report-format=sarif \
            --report-path=/repo/gitleaks.sarif

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run Semgrep
        run: |
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            semgrep/semgrep:1.145.0 \
            semgrep scan \
            --config p/owasp-top-ten \
            --config p/typescript \
            --error \
            --sarif \
            --output semgrep.sarif \
            --exclude docs/superpowers \
            --exclude presentation

      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit JS dependencies
        run: pnpm audit --audit-level=low --ignore=GHSA-h67p-54hq-rp68

  security-header-contract:
    name: Security header contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up pnpm
        uses: pnpm/action-setup@f40ffcd9367d9f12939873eb1018b921a783ffaa # v4

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Check production headers
        run: pnpm run security:headers
