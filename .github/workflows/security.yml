name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly dependency/SAST drift check.
    - cron: '23 4 * * 1'
  workflow_dispatch:

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  codeql:
    name: CodeQL (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python]
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          languages: ${{ matrix.language }}
          queries: +security-extended,security-and-quality

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          category: /language:${{ matrix.language }}

  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout current tree
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.0 dir /repo \
            --redact \
            --no-banner \
            --exit-code=1 \
            --report-format=sarif \
            --report-path=/repo/gitleaks.sarif

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  semgrep:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          # Full history so PR runs can diff against the base commit below.
          fetch-depth: 0

      # Diff-aware on PRs: `--baseline-commit` makes Semgrep report only
      # findings introduced by the PR (base.sha is set only on pull_request
      # events). On push-to-main and the weekly schedule base.sha is empty, so
      # the flag is omitted and Semgrep does a full-tree scan. Rulesets and
      # excludes are identical across both paths.
      - name: Run Semgrep
        env:
          BASELINE_REF: ${{ github.event.pull_request.base.sha }}
        run: |
          baseline_args=""
          if [ -n "${BASELINE_REF}" ]; then
            baseline_args="--baseline-commit ${BASELINE_REF}"
            echo "Diff-aware scan against baseline ${BASELINE_REF}"
          else
            echo "Full-tree scan"
          fi
          docker run --rm \
            -v "$PWD:/src" \
            -w /src \
            semgrep/semgrep:1.145.0 \
            semgrep scan \
            --config p/owasp-top-ten \
            --config p/typescript \
            --config p/python \
            --error \
            --sarif \
            --output semgrep.sarif \
            --exclude docs/superpowers \
            --exclude presentation \
            $baseline_args

      - name: Upload Semgrep SARIF
        if: always() && hashFiles('semgrep.sarif') != ''
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: semgrep.sarif
          category: semgrep

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Bun + install
        uses: ./.github/actions/bun-setup

      - name: Audit JS dependencies
        run: bun audit --audit-level=low

      - name: Set up uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6

      - name: Audit Python analytics dependencies
        run: |
          uvx --no-env-file pip-audit \
            -r apps/backend/analytics/requirements.txt \
            -r apps/backend/analytics/requirements-dev.txt

  security-header-contract:
    name: Security header contract
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      # No `bun ci` here: scripts/check-security-headers.ts only reads the
      # Caddyfile via node:fs, so it needs the Bun runtime but no dependencies.
      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version-file: .bun-version

      - name: Check production headers
        run: bun run security:headers
