name: Deploy Production

on:
  workflow_dispatch:
  workflow_run:
    workflows: [Validate]
    types: [completed]
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  deployments: write

env:
  RAILWAY_CLI_VERSION: 4.48.0

jobs:
  deploy-web:
    name: Deploy Web to Railway
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && vars.RAILWAY_AUTO_DEPLOY == 'true')
    runs-on: ubuntu-latest
    environment: production
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_ENVIRONMENT: ${{ vars.RAILWAY_ENVIRONMENT || 'production' }}
      RAILWAY_SERVICE: ${{ vars.RAILWAY_WEB_SERVICE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Railway configuration
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "Missing RAILWAY_TOKEN repository secret." >&2
            exit 1
          fi

          if [ -z "$RAILWAY_SERVICE" ]; then
            echo "Missing RAILWAY_WEB_SERVICE repository variable." >&2
            exit 1
          fi

      - name: Install Railway CLI
        run: npm install -g "@railway/cli@$RAILWAY_CLI_VERSION"

      - name: Deploy to Railway
        run: railway up --service "$RAILWAY_SERVICE" --environment "$RAILWAY_ENVIRONMENT" --detach
