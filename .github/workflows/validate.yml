name: Validate

on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.sha }}
  cancel-in-progress: true

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.resolve.outputs.web }}
      api: ${{ steps.resolve.outputs.api }}
      analytics: ${{ steps.resolve.outputs.analytics }}
      domain: ${{ steps.filter.outputs.domain }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            workflows:
              - '.github/workflows/**'
            web:
              - 'apps/web/**'
              - 'packages/domain/**'
              - 'bun.lock'
              - 'package.json'
              - 'tsconfig.base.json'
              - 'prettier.config.*'
              - 'eslint.config.*'
            api:
              - 'apps/backend/api/**'
              - 'packages/domain/**'
              - 'Dockerfile.api'
              - 'bun.lock'
              - 'package.json'
              - 'tsconfig.base.json'
              - 'prettier.config.*'
              - 'eslint.config.*'
            analytics:
              - 'apps/backend/analytics/**'
              - 'prettier.config.*'
            domain:
              - 'packages/domain/**'

      # Resolve final values: force web/api/analytics to true when any workflow file changed
      - name: Resolve outputs
        id: resolve
        run: |
          WORKFLOWS="${{ steps.filter.outputs.workflows }}"
          echo "web=$(      [ "$WORKFLOWS" = "true" ] && echo true || echo "${{ steps.filter.outputs.web }}"      )" >> $GITHUB_OUTPUT
          echo "api=$(      [ "$WORKFLOWS" = "true" ] && echo true || echo "${{ steps.filter.outputs.api }}"      )" >> $GITHUB_OUTPUT
          echo "analytics=$([ "$WORKFLOWS" = "true" ] && echo true || echo "${{ steps.filter.outputs.analytics }}" )" >> $GITHUB_OUTPUT

  web:
    needs: [detect]
    if: needs.detect.outputs.web == 'true' && github.event.pull_request.draft != true
    uses: ./.github/workflows/_validate-web.yml

  api:
    needs: [detect]
    if: needs.detect.outputs.api == 'true' && github.event.pull_request.draft != true
    uses: ./.github/workflows/_validate-api.yml

  analytics:
    needs: [detect]
    if: needs.detect.outputs.analytics == 'true' && github.event.pull_request.draft != true
    uses: ./.github/workflows/_validate-analytics.yml

  validate:
    name: 'Validate'
    runs-on: ubuntu-latest
    needs: [detect, web, api, analytics]
    if: always() && github.event.pull_request.draft != true
    steps:
      - name: Check job results
        run: |
          if [[ "${{ needs.web.result }}" == "failure" || "${{ needs.web.result }}" == "cancelled" || \
                "${{ needs.api.result }}" == "failure" || "${{ needs.api.result }}" == "cancelled" || \
                "${{ needs.analytics.result }}" == "failure" || "${{ needs.analytics.result }}" == "cancelled" ]]; then
            echo "One or more validate jobs failed or were cancelled"
            exit 1
          fi
          echo "All validate jobs passed or were skipped"

