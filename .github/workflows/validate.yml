name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: ['**']

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run --filter web typecheck

      - name: Lint
        run: bun run --filter web lint

      - name: Format check
        run: bun run format:check

      - name: Test
        run: bun run --filter web test

      - name: Build
        run: bun run --filter web build
        env:
          VITE_API_URL: http://localhost:3001

  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run --filter api typecheck

      - name: Lint
        run: bun run --filter api lint

      - name: Test
        run: bun run --filter api test

  analytics:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/analytics
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/analytics/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

  audit-bun:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Audit
        run: bun audit

  audit-python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/analytics
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/analytics/requirements*.txt
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit
        run: pip-audit -r requirements.txt -r requirements-dev.txt

