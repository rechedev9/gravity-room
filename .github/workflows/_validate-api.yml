name: Validate API (reusable)

on:
  workflow_call:

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run --filter api typecheck

      - name: Lint
        run: bun run --filter api lint

      - name: Test
        id: test
        run: |
          bun run --filter api test 2>&1 | tee /tmp/api-test-output.txt
          TEST_COUNT=$(grep -oP '\d+(?= (pass|test))' /tmp/api-test-output.txt | head -1 || echo "n/a")
          echo "count=${TEST_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Step summary
        if: always()
        run: |
          {
            echo "## API Validation Summary"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **App** | api |"
            echo "| **Tests passed** | ${{ steps.test.outputs.count }} |"
          } >> "$GITHUB_STEP_SUMMARY"
