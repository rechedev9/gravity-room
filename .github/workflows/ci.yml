name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Web SPA — typecheck, lint, unit tests, and a same-origin production build.
  # The build bakes in VITE_API_URL="" so the static SPA issues relative /api
  # requests against the same-origin Vercel catch-all function. The web build
  # also runs a Playwright/Chromium prerender pass, so Chromium is installed
  # before the build.
  # ---------------------------------------------------------------------------
  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter web run typecheck

      - name: Lint
        run: pnpm --filter web run lint

      - name: Test
        run: pnpm --filter web run test

      - name: Install Playwright Chromium (needed for prerender)
        working-directory: apps/frontend/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Build (same-origin)
        run: pnpm --filter web run build
        env:
          VITE_API_URL: ''

  # ---------------------------------------------------------------------------
  # API — typecheck, lint, and the full unit suite. The api test script runs the
  # analytics suite under src/analytics, which includes the golden-file parity
  # tests (pipelines/pipelines.parity.test.ts) that bound the TypeScript port
  # against the snapshot of the deleted Python service.
  # ---------------------------------------------------------------------------
  api:
    name: API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter api run typecheck

      - name: Lint
        run: pnpm --filter api run lint

      - name: Test (includes analytics golden-file parity)
        run: pnpm --filter api run test

  # ---------------------------------------------------------------------------
  # Shared domain package — the single source of truth for the progression
  # engine and schemas consumed by web, mobile, and api.
  # ---------------------------------------------------------------------------
  domain:
    name: Domain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck:domain

      - name: Test
        run: pnpm run test:domain

  # ---------------------------------------------------------------------------
  # Shared API client package — the typed fetch wrapper consumed by the clients.
  # ---------------------------------------------------------------------------
  api-client:
    name: API client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck:api-client

      - name: Lint
        run: pnpm run lint:api-client

      - name: Test
        run: pnpm run test:api-client

  # ---------------------------------------------------------------------------
  # Expo mobile client — typecheck and the Jest unit suite.
  # ---------------------------------------------------------------------------
  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck:mobile

      - name: Test
        run: pnpm run test:mobile

  # ---------------------------------------------------------------------------
  # Repo-wide Prettier formatting gate.
  # ---------------------------------------------------------------------------
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

  # ---------------------------------------------------------------------------
  # Production security-headers contract — asserts the static-config headers the
  # SPA and API ship match the committed contract.
  # ---------------------------------------------------------------------------
  security-headers:
    name: Security headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate production security headers contract
        run: pnpm run security:headers

  # ---------------------------------------------------------------------------
  # Exercise-wiki citation gate — resolves every wiki citation against
  # Crossref/PubMed and fails closed when any reference cannot be verified. It
  # ALSO fails while any article is still `reviewedBy: 'PENDING'`, which is
  # intentional: it blocks merge of unreviewed content until a human signs off.
  # Network access to api.crossref.org / eutils.ncbi.nlm.nih.gov is required.
  # ---------------------------------------------------------------------------
  citations:
    name: Exercise-wiki citation gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify exercise-wiki citations
        working-directory: apps/frontend/web
        run: pnpm run verify:citations

  # ---------------------------------------------------------------------------
  # OpenAPI client drift — regenerates apps/frontend/web/src/lib/api/generated.ts
  # from the live OpenAPI spec and fails if it drifted from the committed copy.
  #
  # Post-migration the API has no app.listen (it runs serverless via app.fetch),
  # so the local dev server (src/dev-server.ts) boots the same createApp()
  # factory on :3001 with @hono/node-server. SWAGGER_ENABLED=true exposes
  # /swagger/json, which is the codegen source. The dev-auth route is only
  # registered (and thus in the OpenAPI surface) when AUTH_DEV_ROUTE_* are set,
  # so they mirror the values the committed client was generated against. A
  # Postgres service backs /health, which the readiness poll waits on.
  # ---------------------------------------------------------------------------
  api-types-drift:
    name: OpenAPI client drift
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: gravity_room_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/gravity_room_test
      JWT_SECRET: ci-jwt-secret-at-least-64-chars-long-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
      GOOGLE_CLIENT_ID: placeholder-not-used-in-drift-check
      GOOGLE_CLIENT_IDS: placeholder-not-used-in-drift-check
      NODE_ENV: test
      SWAGGER_ENABLED: 'true'
      AUTH_DEV_ROUTE_ENABLED: 'true'
      AUTH_DEV_ROUTE_SECRET: e2e-dev-secret-not-for-prod
      PORT: '3001'
      CORS_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply migrations + seeds
        run: pnpm --filter api run db:deploy

      - name: Regenerate client and check for drift
        run: |
          set -euo pipefail
          pnpm --filter api run start &
          API_PID=$!
          trap 'kill "$API_PID" 2>/dev/null || true' EXIT

          echo "Waiting for the API at http://localhost:3001/health..."
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3001/health > /dev/null 2>&1; then
              echo "API healthy after ${i} retries"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::API did not become healthy within 60s"
              exit 1
            fi
            sleep 2
          done

          pnpm --filter web run api:types

          if ! git diff --exit-code apps/frontend/web/src/lib/api/generated.ts; then
            echo "::error::API types are out of sync. Run 'pnpm --filter web run api:types' locally with the API running and commit the regenerated client."
            exit 1
          fi
