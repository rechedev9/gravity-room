name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Web SPA — typecheck, lint, unit tests, and a same-origin production build.
  # The build bakes in VITE_API_URL="" so the static SPA issues relative /api
  # requests against the same-origin Vercel catch-all function.
  # ---------------------------------------------------------------------------
  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run --filter web typecheck

      - name: Lint
        run: bun run --filter web lint

      - name: Test
        run: bun run --filter web test

      - name: Build (same-origin)
        run: bun run --filter web build
        env:
          VITE_API_URL: ''

  # ---------------------------------------------------------------------------
  # API — typecheck, lint, and the full unit suite. The api test script runs the
  # analytics suite under src/analytics, which includes the golden-file parity
  # tests (pipelines.parity.test.ts) that bound the TypeScript port against the
  # snapshot of the deleted Python service.
  # ---------------------------------------------------------------------------
  api:
    name: API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run --filter api typecheck

      - name: Lint
        run: bun run --filter api lint

      - name: Test (includes analytics golden-file parity)
        run: bun run --filter api test

  # ---------------------------------------------------------------------------
  # Shared domain package — the single source of truth for the progression
  # engine and schemas consumed by web, mobile, and api.
  # ---------------------------------------------------------------------------
  domain:
    name: Domain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck:domain

      - name: Test
        run: bun run test:domain

  # ---------------------------------------------------------------------------
  # Expo mobile client — typecheck and the Jest unit suite.
  # ---------------------------------------------------------------------------
  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck:mobile

      - name: Test
        run: bun run test:mobile

  # ---------------------------------------------------------------------------
  # Repo-wide Prettier formatting gate.
  # ---------------------------------------------------------------------------
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Format check
        run: bun run format:check

  # ---------------------------------------------------------------------------
  # OpenAPI client drift — regenerates apps/frontend/web/src/lib/api/generated.ts
  # from the live OpenAPI spec and fails if it drifted from the committed copy.
  #
  # Post-migration the API has no app.listen (it runs serverless via app.fetch),
  # so we boot the pure createApp() factory on port 3001 with a tiny throwaway
  # server. The /swagger/json document is served from the route/schema metadata
  # alone, so no Postgres or Redis service containers are needed: getDb()/getRedis()
  # are lazy and never touched by the spec endpoint, and in development the Redis
  # guard does not fail-fast.
  # ---------------------------------------------------------------------------
  api-types-drift:
    name: OpenAPI client drift
    runs-on: ubuntu-latest
    env:
      NODE_ENV: development
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Regenerate client and check for drift
        run: |
          # Boot the API via the pure factory; serverless mode dropped app.listen.
          cat > apps/backend/api/ci-openapi-server.ts <<'EOF'
          import { createApp } from './src/create-app';
          const app = createApp({
            corsOrigins: 'http://localhost:3000',
            csp: "default-src 'self'",
            permissionsPolicy: 'camera=()',
          });
          Bun.serve({ port: 3001, fetch: (req) => app.fetch(req) });
          EOF
          ( cd apps/backend/api && bun run ci-openapi-server.ts ) &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true; rm -f apps/backend/api/ci-openapi-server.ts' EXIT

          echo "Waiting for the OpenAPI spec at http://localhost:3001/swagger/json..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3001/swagger/json > /dev/null; then
              echo "OpenAPI spec is being served"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "API never served the OpenAPI spec after 30s"
              exit 1
            fi
            sleep 1
          done

          bun run --filter web api:types
          git diff --exit-code apps/frontend/web/src/lib/api/generated.ts
