name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  validate-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run --filter web typecheck

      - name: Lint
        run: bun run --filter web lint

      - name: Format check
        run: bun run format:check

      - name: Test
        run: bun run --filter web test

      - name: Build
        run: bun run --filter web build
        env:
          VITE_API_URL: http://localhost:3001

  validate-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run --filter api typecheck

      - name: Lint
        run: bun run --filter api lint

      - name: Test
        run: bun run --filter api test

  validate-analytics:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/analytics
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/analytics/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest -q

  deploy:
    runs-on: ubuntu-latest
    needs: [validate-web, validate-api, validate-analytics]
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT }}
          script: |
            set -euo pipefail
            umask 0022
            cd ${{ secrets.VPS_PROJECT_PATH }}
            if [ ! -w .git/index ]; then
              echo "ERROR: .git/index is not writable by $(id -un)."
              echo "Likely cause: someone ran git/edits as root in this directory."
              echo "Fix on VPS: chown -R deploy:deploy $(pwd)"
              exit 1
            fi
            git fetch origin main
            git reset --hard origin/main
            git clean -fd -e .env.production

            COMMIT_SHA=$(git rev-parse HEAD)
            export COMMIT_SHA
            echo "Deploying commit: ${COMMIT_SHA:0:7}"

            docker compose build
            docker compose up -d --remove-orphans

            echo "Waiting for containers to start..."
            sleep 5

            for i in 1 2 3 4 5; do
              if curl -sf http://127.0.0.1:3002/health > /dev/null 2>&1; then
                echo "API health check passed"
                break
              fi
              if [ "$i" -eq 5 ]; then
                echo "API health check FAILED after 5 attempts"
                docker compose logs --tail=50 api
                exit 1
              fi
              echo "API not ready, retrying in 5s... (attempt $i/5)"
              sleep 5
            done

            for i in 1 2 3 4 5; do
              if curl -sf http://127.0.0.1:8080 > /dev/null 2>&1; then
                echo "Web health check passed"
                break
              fi
              if [ "$i" -eq 5 ]; then
                echo "Web health check FAILED after 5 attempts"
                docker compose logs --tail=50 web
                exit 1
              fi
              echo "Web not ready, retrying in 5s... (attempt $i/5)"
              sleep 5
            done

            for i in 1 2 3 4 5; do
              if curl -sf http://127.0.0.1:8001/health > /dev/null 2>&1; then
                echo "Analytics health check passed"
                break
              fi
              if [ "$i" -eq 5 ]; then
                echo "Analytics health check FAILED after 5 attempts"
                docker compose logs --tail=50 analytics
                exit 1
              fi
              echo "Analytics not ready, retrying in 5s... (attempt $i/5)"
              sleep 5
            done

            echo "Deploy verified successfully"
            ./scripts/deploy-log.sh record "$COMMIT_SHA"
            ./scripts/deploy-log.sh rotate

      - name: Notify via Telegram
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          DEPLOY_OUTCOME: ${{ job.status }}
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
        run: |
          SHORT_SHA="${COMMIT_SHA:0:7}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="rechedev9/gravity-room"
          COMMIT_URL="https://github.com/${REPO}/commit/${COMMIT_SHA}"
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"

          if [ "$DEPLOY_OUTCOME" = "success" ]; then
            TEXT=$(printf '<b>Deploy %s OK</b>\n%s\n<a href="%s">View commit</a>' "$SHORT_SHA" "$TIMESTAMP" "$COMMIT_URL")
          else
            TEXT=$(printf '<b>Deploy %s FAILED</b>\n%s\n<a href="%s">View logs</a>' "$SHORT_SHA" "$TIMESTAMP" "$RUN_URL")
          fi

          curl -sf -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            --data-urlencode "parse_mode=HTML" \
            || true
