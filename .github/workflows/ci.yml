name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Web SPA — typecheck, lint, unit tests, and a same-origin production build.
  # The build bakes in VITE_API_URL="" so the static SPA issues relative /api
  # requests against the same-origin Vercel catch-all function. The web build
  # also runs a Playwright/Chromium prerender pass, so Chromium is installed
  # before the build.
  # ---------------------------------------------------------------------------
  web:
    name: Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter web run typecheck

      - name: Lint
        run: pnpm --filter web run lint

      - name: Test
        run: pnpm --filter web run test

      - name: Install Playwright Chromium (needed for prerender)
        working-directory: apps/frontend/web
        run: pnpm exec playwright install --with-deps chromium

      - name: Build (same-origin)
        run: pnpm --filter web run build
        env:
          VITE_API_URL: ''

  # ---------------------------------------------------------------------------
  # API — typecheck, lint, and the full unit suite. The api test script runs the
  # analytics suite under src/analytics, which includes the golden-file parity
  # tests (pipelines/pipelines.parity.test.ts) that bound the TypeScript port
  # against the snapshot of the deleted Python service.
  # ---------------------------------------------------------------------------
  api:
    name: API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter api run typecheck

      - name: Lint
        run: pnpm --filter api run lint

      - name: Test (includes analytics golden-file parity)
        run: pnpm --filter api run test

  # ---------------------------------------------------------------------------
  # Shared domain package — the single source of truth for the progression
  # engine and schemas consumed by web, mobile, and api.
  # ---------------------------------------------------------------------------
  domain:
    name: Domain
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck:domain

      - name: Test
        run: pnpm run test:domain

  # ---------------------------------------------------------------------------
  # Shared API client package — the typed fetch wrapper consumed by the clients.
  # ---------------------------------------------------------------------------
  api-client:
    name: API client
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck:api-client

      - name: Lint
        run: pnpm run lint:api-client

      - name: Test
        run: pnpm run test:api-client

  # ---------------------------------------------------------------------------
  # Expo mobile client — typecheck and the Jest unit suite.
  # ---------------------------------------------------------------------------
  mobile:
    name: Mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck:mobile

      - name: Test
        run: pnpm run test:mobile

  # ---------------------------------------------------------------------------
  # Repo-wide Prettier formatting gate.
  # ---------------------------------------------------------------------------
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm run format:check

  # ---------------------------------------------------------------------------
  # OpenAPI client drift — catches divergence between the live ElysiaJS OpenAPI
  # surface and the committed client at apps/frontend/web/src/lib/api/generated.ts.
  # No Postgres needed: the serverless entrypoint has no boot-time DDL, so
  # /swagger/json serves from route schemas alone (DATABASE_URL just has to be
  # set — it is only dialed on the first DB-touching request). The dev auth
  # routes must be enabled because the committed client includes them.
  # ---------------------------------------------------------------------------
  api-types-drift:
    name: OpenAPI client drift
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/unused_swagger_only
      JWT_SECRET: ci-drift-check-secret-not-a-real-secret-just-32-plus-chars
      SWAGGER_ENABLED: 'true'
      AUTH_DEV_ROUTE_ENABLED: 'true'
      AUTH_DEV_ROUTE_SECRET: e2e-dev-secret-not-for-prod
      PORT: '3001'
      CORS_ORIGIN: http://localhost:3000
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Regenerate client and diff
        run: |
          set -euo pipefail
          pnpm --filter api run start &
          API_PID=$!
          trap 'kill $API_PID 2>/dev/null || true' EXIT

          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3001/swagger/json > /dev/null 2>&1; then
              echo "Swagger up after ${i} attempts"
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "::error::/swagger/json did not come up within 60s"
              exit 1
            fi
            sleep 2
          done

          pnpm --filter web run api:types

          if ! git diff --exit-code apps/frontend/web/src/lib/api/generated.ts; then
            echo "::error::API client is out of sync. Run 'pnpm --filter web run api:types' with the API running and commit the regenerated apps/frontend/web/src/lib/api/generated.ts."
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Gitleaks secret scan — scans git history (not just the working tree) so
  # removed-but-recoverable secrets are caught. On pull_request, scoped to the
  # PR's commit range so pre-existing historical commits aren't re-flagged; on
  # push it scans the full history.
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout full history
        uses: actions/checkout@v5
        with:
          # Gitleaks git mode reads the commit graph; full history is required
          # to detect secrets that were committed and later removed.
          fetch-depth: 0

      - name: Run Gitleaks
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          LOG_OPTS=""
          if [ "$EVENT_NAME" = "pull_request" ]; then
            LOG_OPTS="--log-opts=${PR_BASE_SHA}..${PR_HEAD_SHA}"
          fi
          # --config is REQUIRED: gitleaks runs with the container CWD at `/`,
          # not the mounted `/repo`, so it cannot auto-discover the repo's
          # .gitleaks.toml. Without this, the project allowlist is ignored and
          # the scan re-flags long-lived false positives (the public IndexNow
          # key, fake-JWT test fixtures), failing every push to main.
          docker run --rm \
            -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.0 git /repo \
            --config=/repo/.gitleaks.toml \
            $LOG_OPTS \
            --redact \
            --no-banner \
            --exit-code=1 \
            --report-format=sarif \
            --report-path=/repo/gitleaks.sarif

      - name: Upload Gitleaks SARIF
        if: always() && hashFiles('gitleaks.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks

  # ---------------------------------------------------------------------------
  # Aggregate gate. Branch protection requires a single status check named
  # "Validate"; this job reports it and succeeds only when every job above
  # passed (a failed dependency leaves it skipped, which does not satisfy the
  # required check). Keeps the required-checks list stable across CI changes.
  # ---------------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest
    needs: [web, api, domain, api-client, mobile, format, api-types-drift, secret-scan]
    steps:
      - run: echo "All CI checks passed."
