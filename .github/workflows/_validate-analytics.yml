name: Validate Analytics (reusable)

on:
  workflow_call:

jobs:
  analytics:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend/analytics
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: apps/backend/analytics/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Lint
        run: ruff check .

      - name: Test
        id: test
        run: |
          pytest -q 2>&1 | tee /tmp/analytics-test-output.txt
          TEST_COUNT=$(grep -oP '^\d+(?= passed)' /tmp/analytics-test-output.txt | head -1 || echo "n/a")
          echo "count=${TEST_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Step summary
        if: always()
        run: |
          {
            echo "## Analytics Validation Summary"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **App** | analytics |"
            echo "| **Tests passed** | ${{ steps.test.outputs.count }} |"
          } >> "$GITHUB_STEP_SUMMARY"
