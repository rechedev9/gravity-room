name: Harness

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: harness-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: gzclp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/gzclp
      JWT_SECRET: ci-test-secret-not-for-production-use-64chars-minimum-padding-here
      CORS_ORIGIN: http://localhost:5173
      PORT: 3001
      LOG_LEVEL: silent

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/go-api/go.mod
          cache-dependency-path: apps/go-api/go.sum

      - run: bun install --frozen-lockfile

      - name: Run TS API contract tests
        run: bun run test:harness

      - name: Run Go unit tests
        working-directory: apps/go-api
        run: go test ./...

      - name: Run Go API contract tests
        run: scripts/harness-go
