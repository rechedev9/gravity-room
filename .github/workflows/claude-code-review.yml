name: Claude Code Review

on:
  pull_request:
    types: [ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-code-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    steps:
      - uses: actions/checkout@v6
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          direct_prompt: |
            Please review this pull request and provide feedback on high-confidence issues only.
            Focus on: bugs, security vulnerabilities, and significant logic errors.
            Do NOT comment on style, formatting, or minor improvements.
            Be concise — one comment per issue maximum.
          allowed_tools: 'Bash(gh pr view),Bash(gh pr diff),Bash(gh pr files)'
