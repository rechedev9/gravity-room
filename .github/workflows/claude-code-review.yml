name: Claude Code Review

on:
  pull_request:
    types: [ready_for_review]

permissions:
  contents: read
  pull-requests: write

jobs:
  claude-code-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft != true
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: anthropics/claude-code-action@51705da45eecce209d4700538bf8377d5b5fc695 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            Please review this pull request and provide feedback on high-confidence issues only.
            Focus on: bugs, security vulnerabilities, and significant logic errors.
            Do NOT comment on style, formatting, or minor improvements.
            Be concise — one comment per issue maximum.
          claude_args: >-
            --allowedTools "Bash(gh pr view),Bash(gh pr diff),Bash(gh pr files)"
