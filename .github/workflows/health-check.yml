name: Health Check

on:
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check API health
        id: api
        run: |
          if curl -sf --max-time 10 https://gravityroom.app/health > /dev/null 2>&1; then
            echo "status=up" >> "$GITHUB_OUTPUT"
          else
            echo "status=down" >> "$GITHUB_OUTPUT"
          fi

      - name: Check web
        id: web
        run: |
          if curl -sf --max-time 10 https://gravityroom.app > /dev/null 2>&1; then
            echo "status=up" >> "$GITHUB_OUTPUT"
          else
            echo "status=down" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify if down
        if: steps.api.outputs.status == 'down' || steps.web.outputs.status == 'down'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          API_STATUS: ${{ steps.api.outputs.status }}
          WEB_STATUS: ${{ steps.web.outputs.status }}
          RUN_ID: ${{ github.run_id }}
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="rechedev9/gravity-room"
          RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"

          TEXT=$(printf '<b>ALERT: Service down</b>\n%s\nAPI: %s\nWeb: %s\n<a href="%s">View logs</a>' \
            "$TIMESTAMP" "$API_STATUS" "$WEB_STATUS" "$RUN_URL")

          curl -sf -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${TEXT}" \
            --data-urlencode "parse_mode=HTML" \
            || true
