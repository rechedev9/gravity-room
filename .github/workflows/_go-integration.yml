name: Go Integration Tests

on:
  workflow_call:

jobs:
  e2e:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: gzclp
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:password@localhost:5432/gzclp
      JWT_SECRET: ci-test-secret-not-for-production-use-64chars-minimum-padding-here
      CORS_ORIGIN: http://localhost:3001
      PORT: 3001
      LOG_LEVEL: silent
      VITE_API_URL: http://localhost:3001
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-go@v5
        with:
          go-version-file: apps/go-api/go.mod
          cache-dependency-path: apps/go-api/go.sum

      - name: Cache bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lockb') }}
          restore-keys: ${{ runner.os }}-bun-

      - run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        working-directory: apps/web
        run: bunx playwright install chromium --with-deps

      - name: Run E2E tests against Go API
        working-directory: apps/web
        run: bunx playwright test
