name: Validate Web (reusable)

on:
  workflow_call:

jobs:
  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.21

      - uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run --filter web typecheck

      - name: Lint
        run: bun run --filter web lint

      - name: Format check
        run: bun run format:check

      - name: Test
        id: test
        run: |
          bun run --filter web test 2>&1 | tee /tmp/web-test-output.txt
          TEST_COUNT=$(grep -oP '\d+(?= (pass|test))' /tmp/web-test-output.txt | head -1 || echo "n/a")
          echo "count=${TEST_COUNT}" >> "$GITHUB_OUTPUT"

      - name: Build
        id: build
        run: |
          BUILD_START=$(date +%s)
          bun run --filter web build
          BUILD_END=$(date +%s)
          echo "duration=$((BUILD_END - BUILD_START))" >> "$GITHUB_OUTPUT"
        env:
          VITE_API_URL: http://localhost:3001

      - name: Step summary
        if: always()
        run: |
          echo "## Web Validation Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **App** | web |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Tests passed** | ${{ steps.test.outputs.count }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Build duration** | ${{ steps.build.outputs.duration }}s |" >> "$GITHUB_STEP_SUMMARY"
