# Local dev compose — no external networks required.
# Usage: docker compose -f docker-compose.dev.yml up --build
#
# Ports:
#   API       → http://localhost:3002
#   Web       → http://localhost:8080
#   Postgres  → localhost:5432
#   Redis     → localhost:6379

services:
  postgres:
    image: postgres:16-alpine
    container_name: gravity-dev-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gzclp
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d gzclp']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dev

  redis:
    image: redis:7-alpine
    container_name: gravity-dev-redis
    restart: unless-stopped
    ports:
      - '127.0.0.1:6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dev

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      # Dockerfile.api includes a web build stage; these args satisfy it.
      # The web SPA baked into the api image is not served here — the
      # dedicated 'web' nginx service is canonical in this dev stack.
      args:
        VITE_API_URL: http://localhost:3002
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        COMMIT_SHA: ${COMMIT_SHA:-dev}
    container_name: gravity-dev-api
    restart: unless-stopped
    ports:
      - '3002:3001'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/gzclp
      JWT_SECRET: ${JWT_SECRET:-dev-only-secret-not-for-production-use-replace-with-64-char-random}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      CORS_ORIGIN: http://localhost:8080
      PORT: '3001'
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: debug
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:3001/health']
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - dev

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        # Point to the same origin so CSP connect-src 'self' is satisfied.
        # Nginx proxies /api/ and /auth/ to the api container (see nginx.dev.conf).
        VITE_API_URL: http://localhost:8080
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        COMMIT_SHA: ${COMMIT_SHA:-dev}
    container_name: gravity-dev-web
    restart: unless-stopped
    ports:
      - '8080:80'
    volumes:
      - ./apps/web/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost/']
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - dev

volumes:
  postgres_dev_data:

networks:
  dev:
    driver: bridge
