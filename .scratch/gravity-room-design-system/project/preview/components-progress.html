<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#8a7a5a;margin-bottom:10px}
  .bar{height:8px;background:#2a2218;position:relative;margin-bottom:14px}
  .fill{height:100%;background:#e8aa20;position:relative}
  .fill::after{content:'';position:absolute;right:0;top:0;bottom:0;width:24px;background:linear-gradient(90deg,transparent,rgba(232,170,32,0.4))}
  .meta{display:flex;justify-content:space-between;font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:#8a7a5a}
</style></head>
<body><div class="card">
  <div class="lbl">Progress bar · gold fill with edge glow</div>
  <div class="bar"><div class="fill" style="width:60%"></div></div>
  <div class="meta"><span>Week 4 of 12</span><span>+10 kg from start</span></div>
  <div style="height:18px"></div>
  <div class="bar"><div class="fill" style="width:25%"></div></div>
  <div class="meta"><span>Workout 3 / 12</span><span>25%</span></div>
</div></body></html>
