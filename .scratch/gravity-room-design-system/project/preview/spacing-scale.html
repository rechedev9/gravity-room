<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_card.css" />
    <style>
      .lbl {
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #8a7a5a;
        margin-bottom: 8px;
      }
      .scale {
        display: flex;
        gap: 0;
        align-items: flex-end;
      }
      .step {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        flex: 1;
        min-width: 0;
      }
      .box {
        background: #e8aa20;
        width: 80%;
        border: 1px solid #3a3025;
      }
      .v {
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        color: #a89870;
        letter-spacing: 0.1em;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="lbl">Spacing scale · 4-step · Tailwind</div>
      <div class="scale">
        <div class="step">
          <div class="box" style="height: 4px"></div>
          <div class="v">4</div>
        </div>
        <div class="step">
          <div class="box" style="height: 8px"></div>
          <div class="v">8</div>
        </div>
        <div class="step">
          <div class="box" style="height: 12px"></div>
          <div class="v">12</div>
        </div>
        <div class="step">
          <div class="box" style="height: 16px"></div>
          <div class="v">16</div>
        </div>
        <div class="step">
          <div class="box" style="height: 20px"></div>
          <div class="v">20</div>
        </div>
        <div class="step">
          <div class="box" style="height: 24px"></div>
          <div class="v">24</div>
        </div>
        <div class="step">
          <div class="box" style="height: 32px"></div>
          <div class="v">32</div>
        </div>
        <div class="step">
          <div class="box" style="height: 40px"></div>
          <div class="v">40</div>
        </div>
        <div class="step">
          <div class="box" style="height: 48px"></div>
          <div class="v">48</div>
        </div>
        <div class="step">
          <div class="box" style="height: 64px"></div>
          <div class="v">64</div>
        </div>
        <div class="step">
          <div class="box" style="height: 80px"></div>
          <div class="v">80</div>
        </div>
      </div>
    </div>
  </body>
</html>
