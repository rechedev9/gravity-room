<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_card.css" />
    <style>
      .lbl {
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #8a7a5a;
        margin-bottom: 10px;
      }
      .btns {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
      }
      .btn {
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        padding: 14px 28px;
        border: 2px solid #e8aa20;
        background: #e8aa20;
        color: #0b0906;
        cursor: pointer;
      }
      .btn.outline {
        background: #130f09;
        color: #e8aa20;
      }
      .btn.ghost {
        border-color: #2a2218;
        color: #8a7a5a;
        background: #130f09;
      }
      .btn.danger {
        border-color: #7a2828;
        background: #240e0e;
        color: #c05050;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="lbl">Buttons · uppercase mono · 2px border · square</div>
      <div class="btns">
        <button class="btn">Get Started →</button>
        <button class="btn outline">Sign In →</button>
        <button class="btn ghost">How It Works</button>
        <button class="btn danger">Delete</button>
      </div>
    </div>
  </body>
</html>
