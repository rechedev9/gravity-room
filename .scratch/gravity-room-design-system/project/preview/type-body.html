<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_card.css" />
    <style>
      .lbl {
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #8a7a5a;
        margin-bottom: 6px;
      }
      .h3 {
        font-family: 'Bebas Neue', sans-serif;
        color: #f0c040;
        font-size: 30px;
        letter-spacing: 0.04em;
        margin: 0;
        line-height: 1.1;
      }
      .h4 {
        font-family: 'Barlow', sans-serif;
        color: #f0e8d8;
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        margin: 0;
      }
      .body {
        font-family: 'Barlow', sans-serif;
        color: #8a7a5a;
        font-size: 14px;
        line-height: 1.6;
        margin: 0;
        max-width: 560px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="lbl">H3 · Bebas Neue 30 · letterspacing 0.04</div>
      <p class="h3">Choose Your Program</p>
      <div class="divider"></div>
      <div class="lbl">H4 · Barlow 700 14 · uppercase 0.06</div>
      <p class="h4">Smart Progression</p>
      <div class="divider"></div>
      <div class="lbl">Body · Barlow 400 · 14/1.6</div>
      <p class="body">
        Stop guessing at the gym. Follow proven programs that automatically adjust weight, sets, and
        reps — so every session moves you forward.
      </p>
    </div>
  </body>
</html>
