<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="row">
        <div class="swatch" style="background: #0b0906">
          <div class="name" style="color: #f0e8d8">Body</div>
          <div class="hex" style="color: #8a7a5a">#0B0906</div>
        </div>
        <div class="swatch" style="background: #070504">
          <div class="name" style="color: #f0e8d8">Header</div>
          <div class="hex" style="color: #8a7a5a">#070504</div>
        </div>
        <div class="swatch" style="background: #130f09">
          <div class="name" style="color: #f0e8d8">Card</div>
          <div class="hex" style="color: #8a7a5a">#130F09</div>
        </div>
        <div class="swatch" style="background: #1a1410">
          <div class="name" style="color: #f0e8d8">Hover / TH</div>
          <div class="hex" style="color: #8a7a5a">#1A1410</div>
        </div>
        <div class="swatch" style="background: #2a2218">
          <div class="name" style="color: #f0e8d8">Rule</div>
          <div class="hex" style="color: #a89870">#2A2218</div>
        </div>
        <div class="swatch" style="background: #3a3025">
          <div class="name" style="color: #f0e8d8">Rule Light</div>
          <div class="hex" style="color: #a89870">#3A3025</div>
        </div>
      </div>
    </div>
  </body>
</html>
