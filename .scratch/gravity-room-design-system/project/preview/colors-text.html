<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_card.css" />
  </head>
  <body>
    <div class="card">
      <div class="row">
        <div class="swatch" style="background: #f0c040; color: #0b0906">
          <div class="name">Title (Gold)</div>
          <div class="hex">#F0C040</div>
        </div>
        <div class="swatch" style="background: #e8aa20; color: #0b0906">
          <div class="name">Accent</div>
          <div class="hex">#E8AA20</div>
        </div>
        <div class="swatch" style="background: #f0e8d8; color: #0b0906">
          <div class="name">Main</div>
          <div class="hex">#F0E8D8</div>
        </div>
        <div class="swatch" style="background: #a89870; color: #130f09">
          <div class="name">Label</div>
          <div class="hex">#A89870</div>
        </div>
        <div class="swatch" style="background: #8a7a5a; color: #130f09">
          <div class="name">Muted / Info</div>
          <div class="hex">#8A7A5A</div>
        </div>
      </div>
    </div>
  </body>
</html>
