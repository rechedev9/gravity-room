<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="_card.css" />
    <style>
      .specimen {
        padding: 8px 0;
      }
      .lbl {
        font-family: 'JetBrains Mono', monospace;
        font-size: 9px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #8a7a5a;
        margin-bottom: 6px;
      }
      .display-xl {
        font-family: 'Bebas Neue', sans-serif;
        color: #f0c040;
        font-size: 96px;
        line-height: 0.95;
        letter-spacing: 0.02em;
        margin: 0;
      }
      .display-l {
        font-family: 'Bebas Neue', sans-serif;
        color: #f0c040;
        font-size: 56px;
        line-height: 1;
        letter-spacing: 0.02em;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="specimen">
        <div class="lbl">H1 · Bebas Neue · 96/0.95 · clamp(72,12vw,140)</div>
        <div class="display-xl">Train Smarter.</div>
      </div>
      <div class="divider"></div>
      <div class="specimen">
        <div class="lbl">H2 · Bebas Neue · 56/1 · clamp(40,6vw,72)</div>
        <div class="display-l">Three Steps. That's It.</div>
      </div>
    </div>
  </body>
</html>
