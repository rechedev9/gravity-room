<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#8a7a5a;margin-bottom:10px}
  .pcard{background:#130f09;border:1px solid #2a2218;padding:24px;text-align:center;position:relative;overflow:hidden}
  .pcard::before{content:'';position:absolute;top:0;left:0;right:0;height:60px;background:linear-gradient(180deg,rgba(74,144,217,0.08),transparent);pointer-events:none}
  .badge{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;padding:4px 10px;border:1px solid rgba(74,144,217,0.4);color:#4a90d9;display:inline-block;margin-bottom:14px;position:relative}
  .name{font-family:'Bebas Neue',sans-serif;font-size:30px;color:#f0c040;letter-spacing:0.04em;margin:0 0 4px;line-height:1.1}
  .by{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;color:#8a7a5a;margin:0 0 12px}
  .desc{font-family:'Barlow',sans-serif;font-size:13px;color:#8a7a5a;line-height:1.5;margin:0 0 16px}
  .meta{display:flex;justify-content:center;gap:8px}
  .pill{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.15em;text-transform:uppercase;border:1px solid #3a3025;color:#8a7a5a;padding:4px 10px;background:#0b0906}
</style></head>
<body><div class="card">
  <div class="lbl">Program card · category gradient wash + ring badge</div>
  <div class="pcard">
    <span class="badge">Strength</span>
    <h3 class="name">GZCLP</h3>
    <p class="by">by Cody Lefever</p>
    <p class="desc">Linear progression with tier-based exercises and smart staged failure handling.</p>
    <div class="meta"><span class="pill">3 days/week</span><span class="pill">12 weeks</span></div>
  </div>
</div></body></html>
