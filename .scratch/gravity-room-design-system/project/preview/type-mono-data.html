<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#8a7a5a;margin-bottom:6px}
  .eyebrow{font-family:'JetBrains Mono',monospace;color:#8a7a5a;font-size:11px;font-weight:600;letter-spacing:0.3em;text-transform:uppercase}
  .badge{font-family:'JetBrains Mono',monospace;color:#8a7a5a;font-size:10px;letter-spacing:0.2em;text-transform:uppercase;border:1px solid #3a3025;padding:6px 10px;display:inline-block}
  .data{font-family:'Bebas Neue',sans-serif;letter-spacing:0.02em;color:#f0c040;font-size:48px;line-height:1}
  .row2{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
</style></head>
<body><div class="card">
  <div class="lbl">Eyebrow · JetBrains Mono 11 · ls 0.3</div>
  <div class="eyebrow">100% Free · Syncs Across Devices</div>
  <div class="divider"></div>
  <div class="lbl">Badge · JetBrains Mono 10 · ls 0.2</div>
  <div><span class="badge">3 days/week</span> &nbsp; <span class="badge">12 weeks</span></div>
  <div class="divider"></div>
  <div class="lbl">Stat · Bebas Neue · ls 0.02 · "font-display-data"</div>
  <div class="row2"><span class="data">80 kg</span><span class="data" style="color:#f0e8d8">5×3</span><span class="data" style="color:#6aaa3a">+10</span></div>
</div></body></html>
