<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .lbl{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:#8a7a5a;margin-bottom:8px}
  .row3{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .swatch{height:90px;background:#130f09;border:1px solid #2a2218;display:flex;align-items:flex-end;padding:8px;font-family:'JetBrains Mono',monospace;font-size:9px;color:#a89870;letter-spacing:0.15em;text-transform:uppercase}
</style></head>
<body><div class="card">
  <div class="lbl">Shadows / Elevation</div>
  <div class="row3">
    <div class="swatch" style="box-shadow:0 1px 2px rgba(0,0,0,.3),0 1px 6px rgba(0,0,0,.15)">card</div>
    <div class="swatch" style="box-shadow:0 4px 20px rgba(0,0,0,.45),0 0 0 1px rgba(232,170,32,.06)">card-hover</div>
    <div class="swatch" style="box-shadow:0 8px 32px rgba(0,0,0,.6),0 0 0 1px rgba(232,170,32,.04)">elevated</div>
    <div class="swatch" style="box-shadow:0 0 20px rgba(232,170,32,.10)">glow-gold</div>
  </div>
</div></body></html>
