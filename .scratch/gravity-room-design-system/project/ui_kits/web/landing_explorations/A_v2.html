      const { useState, useEffect, useRef } = React;

      function useReveal() {
        useEffect(() => {
          const els = document.querySelectorAll('.reveal');
          const io = new IntersectionObserver(
            (entries) =>
              entries.forEach((e) => e.isIntersecting && e.target.classList.add('is-in')),
            { threshold: 0.12 }
          );
          els.forEach((el) => io.observe(el));
          return () => io.disconnect();
        }, []);
      }

      // ─────────────────────────────────────────────────────────
      // Hero — desktop browser-frame app preview, full session in progress
      // ─────────────────────────────────────────────────────────
      function DesktopAppPreview() {
        // Three lifts: Squat done, Bench in-progress, Deadlift queued
        const [bench, setBench] = useState(['done', 'done', 'fail', 'todo', 'todo']);
        useEffect(() => {
          let i = 3;
          const t = setInterval(() => {
            setBench((prev) => {
              if (i >= 5) {
                i = 3;
                return ['done', 'done', 'fail', 'todo', 'todo'];
              }
              const n = [...prev];
              n[i] = 'done';
              i++;
              return n;
            });
          }, 1400);
          return () => clearInterval(t);
        }, []);

        const benchDone = bench.filter((s) => s === 'done' || s === 'fail').length;

        return (
          <div className="bframe">
            <div className="bframe__chrome">
              <span className="bframe__dot bframe__dot--r" />
              <span className="bframe__dot bframe__dot--y" />
              <span className="bframe__dot bframe__dot--g" />
              <span className="bframe__url">gravityroom.app/train/gzclp/a1</span>
              <span className="bframe__rec">Live Session</span>
            </div>
            <div className="bframe__body">
              <div className="bframe__sessionhead">
                <div>
                  <div className="bframe__crumb">Mon · 04 May · Week 4 / 12</div>
                  <h3>GZCLP · A1.</h3>
                </div>
                <div className="bframe__progress">
                  <ProgressBar
                    value={((5 + benchDone) / 15) * 100}
                    left={`${5 + benchDone} / 15 sets`}
                    right={`${Math.round(((5 + benchDone) / 15) * 100)}%`}
                  />
                </div>
              </div>

              {/* Squat — done */}
              <div className="bframe__lift bframe__lift--done">
                <div>
                  <h4 className="bframe__lift-name">Squat</h4>
                  <div className="bframe__lift-meta">
                    <Badge tone="strength">T1</Badge>
                    <Badge>5 × 5</Badge>
                    <Badge tone="ok">PR · +2.5kg</Badge>
                  </div>
                  <div className="bframe__lift-weight">122.5 kg</div>
                </div>
                <div className="bframe__sets">
                  {[1, 2, 3, 4, 5].map((i) => (
                    <div key={i} className="set-cell set-cell--done">
                      ✓
                    </div>
                  ))}
                </div>
              </div>

              {/* Bench — in progress */}
              <div className="bframe__lift">
                <div>
                  <h4 className="bframe__lift-name">Bench Press</h4>
                  <div className="bframe__lift-meta">
                    <Badge tone="power">T2</Badge>
                    <Badge>3 × 10</Badge>
                    <Badge dot>RPE 8</Badge>
                  </div>
                  <div className="bframe__lift-weight">72.5 kg</div>
                </div>
                <div className="bframe__sets">
                  {bench.map((s, i) => {
                    const cur = i === bench.findIndex((x) => x === 'todo');
                    const cls = [
                      'set-cell',
                      s === 'done' && 'set-cell--done',
                      s === 'fail' && 'set-cell--fail',
                      cur && 'set-cell--current',
                    ]
                      .filter(Boolean)
                      .join(' ');
                    return (
                      <div key={i} className={cls}>
                        {s === 'done' ? '✓' : s === 'fail' ? '8/10' : '3×10'}
                      </div>
                    );
                  })}
                </div>
              </div>

              {/* Deadlift — queued */}
              <div className="bframe__lift bframe__lift--ghost">
                <div>
                  <h4 className="bframe__lift-name">Deadlift</h4>
                  <div className="bframe__lift-meta">
                    <Badge tone="hyper">T3</Badge>

                    <Badge>AMRAP</Badge>
                  </div>

                </div>
                <div className="bframe__sets">

                    <div key={i} className="set-cell">
                      3×15
                    </div>

      function useTicker(start, perSecond) {
        const [v, setV] = useState(start);
        useEffect(() => {
          const t = setInterval(() => setV((x) => x + perSecond / 4), 250);
          return () => clearInterval(t);
        }, [perSecond]);
        return v;
      }
