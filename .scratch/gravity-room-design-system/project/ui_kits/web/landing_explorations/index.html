<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gravity Room · Landing Page Explorations</title>
    <link rel="icon" href="../../assets/favicon.webp" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #f0eee9;
        font-family: -apple-system, system-ui, sans-serif;
      }
      #root {
        height: 100vh;
      }
      iframe {
        display: block;
        border: 0;
        background: #0b0906;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script
      src="https://unpkg.com/react@18.3.1/umd/react.development.js"
      integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js"
      integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"
      integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y"
      crossorigin="anonymous"
    ></script>
    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel">
      // Each artboard is an iframe loading one of the variants.
      // We render at 1280×900 in the artboard frame; the canvas scales as needed
      // and the focus-mode overlay shows them full-bleed.
      const W = 1280,
        H = 900;

      function VariantFrame({ src }) {
        return (
          <iframe
            src={src}
            width={W}
            height={H}
            style={{ width: W, height: H, background: '#0b0906' }}
            loading="lazy"
            title={src}
          />
        );
      }

      function App() {
        return (
          <DesignCanvas>
            <DCSection
              id="landing"
              title="Landing Page · 3 Directions"
              subtitle="Open any artboard fullscreen with the expand icon to see the whole page; scroll within to compare sections."
            >
              <DCArtboard
                id="A"
                label="A · App Preview Hero · Stat Strip · Programs"
                width={W}
                height={H}
              >
                <VariantFrame src="A.html" />
              </DCArtboard>
              <DCArtboard
                id="B"
                label="B · Numbers Wall · GZCLP Ladder · FAQ · GitHub"
                width={W}
                height={H}
              >
                <VariantFrame src="B.html" />
              </DCArtboard>
              <DCArtboard
                id="C"
                label="C · Live Set-Grid Hero · Comparison · Testimonials"
                width={W}
                height={H}
              >
                <VariantFrame src="C.html" />
              </DCArtboard>
            </DCSection>
            <DCSection
              id="reference"
              title="Reference · Original Landing"
              subtitle="The faithful first port — for comparison."
            >
              <DCArtboard id="ref" label="Original" width={W} height={H}>
                <VariantFrame src="../index.html" />
              </DCArtboard>
            </DCSection>
          </DesignCanvas>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>
