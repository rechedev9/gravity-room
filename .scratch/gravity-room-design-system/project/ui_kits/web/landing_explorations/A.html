      function useReveal() {
        React.useEffect(() => {
          const els = document.querySelectorAll('.reveal');
          const io = new IntersectionObserver(
            (entries) =>
              entries.forEach((e) => e.isIntersecting && e.target.classList.add('is-in')),
            { threshold: 0.12 }
          );
          els.forEach((el) => io.observe(el));
          return () => io.disconnect();
        }, []);
      }

      /* ─────────────────────────────────────────────────────────
   Hero — Browser-frame desktop session preview
   Squat (done), Bench (mid-set), Deadlift (queued)
   ───────────────────────────────────────────────────────── */
      function DesktopSessionPreview() {
        const [bench, setBench] = React.useState(['done', 'done', 'done', 'todo', 'todo']);
        React.useEffect(() => {
          let i = 3;
          const t = setInterval(() => {
            setBench((prev) => {
              if (i >= 5) {
                i = 3;
                return ['done', 'done', 'done', 'todo', 'todo'];
              }
              const n = [...prev];
              n[i] = 'done';
              i++;
              return n;
            });
          }, 1300);
          return () => clearInterval(t);
        }, []);
        const benchDone = bench.filter((s) => s === 'done').length;
        const totalDone = 5 + benchDone;

        return (
          <div className="bframe">
            <div className="bframe__chrome">
              <span className="bframe__dot bframe__dot--r" />
              <span className="bframe__dot bframe__dot--y" />
              <span className="bframe__dot bframe__dot--g" />
              <span className="bframe__url">app.gravity.room/train</span>
              <span className="bframe__rec">Live Session · 00:32:14</span>
            </div>
            <div className="bframe__body">
              <div className="bframe__sessionhead">
                <div>
                  <div className="bframe__crumb">GZCLP · Session A1 · Week 4 / 12</div>
                  <h3>Heavy Day.</h3>
                </div>
                <div className="bframe__progress">
                  <ProgressBar
                    value={(totalDone / 15) * 100}
                    left={`Set ${totalDone} / 15`}
                    right={`${Math.round((totalDone / 15) * 100)}%`}
                  />
                </div>
              </div>

              {/* Squat — fully done */}
              <div className="bframe__lift bframe__lift--done">
                <div>
                  <h4 className="bframe__lift-name">Squat</h4>
                  <div className="bframe__lift-meta">
                    <Badge>T1</Badge>
                    <Badge>5 × 5</Badge>
                    <Badge tone="ok">+2.5 kg</Badge>
                  </div>
                  <div className="bframe__lift-weight">120 kg</div>
                </div>
                <div className="bframe__sets">
                  {['done', 'done', 'done', 'done', 'done'].map((s, i) => (
                    <SetCell key={i} state={s} target={5} reps={5} />
                  ))}
                </div>
              </div>

              {/* Bench — mid-rep, animating */}
              <div className="bframe__lift">
                <div>
                  <h4 className="bframe__lift-name">Bench Press</h4>
                  <div className="bframe__lift-meta">
                    <Badge>T2</Badge>
                    <Badge>3 × 10</Badge>
                    <Badge dot>RPE 7.5</Badge>
                  </div>
                  <div className="bframe__lift-weight">72.5 kg</div>
                </div>
                <div className="bframe__sets">
                  {bench.map((s, i) => (
                    <SetCell
                      key={i}
                      state={s}
                      target={10}
                      reps={10}
                      current={s === 'todo' && i === bench.findIndex((x) => x === 'todo')}
                    />
                  ))}
                </div>
              </div>

              {/* Deadlift — queued */}
              <div className="bframe__lift bframe__lift--ghost">
                <div>
                  <h4 className="bframe__lift-name">Deadlift</h4>
                  <div className="bframe__lift-meta">
                    <Badge>T1</Badge>
                    <Badge>1 × 5</Badge>
                  </div>
                  <div className="bframe__lift-weight">155 kg</div>
                </div>
                <div className="bframe__sets">
                  {['todo', 'todo', 'todo', 'todo', 'todo'].map((s, i) => (
                    <SetCell key={i} state={s} target={5} reps={0} />
                  ))}
                </div>
              </div>
            </div>
          </div>
        );
      }

      /* ─────────────────────────────────────────────────────────
   Live-ticking stats — sets logged ticks visibly
   ───────────────────────────────────────────────────────── */
      function LiveStrip() {
        const [setsLogged, setSetsLogged] = React.useState(2143829);
        const [activeNow, setActiveNow] = React.useState(347);
        React.useEffect(() => {
          const a = setInterval(
            () => setSetsLogged((n) => n + Math.floor(1 + Math.random() * 4)),
            800
          );
          const b = setInterval(
            () =>
              setActiveNow((n) =>
                Math.max(
                  280,
                  Math.min(420, n + (Math.random() < 0.5 ? -1 : 1) * Math.floor(Math.random() * 4))
                )
              ),
            1700
          );
          return () => {
            clearInterval(a);
            clearInterval(b);
          };
        }, []);
        return (
          <div className="livestrip reveal">
            <div className="livestrip__cell">
              <div className="livestrip__num livestrip__num--accent">{activeNow}</div>
              <div className="livestrip__lbl">Lifting Right Now</div>
              <div className="livestrip__delta">live · 47 countries</div>
            </div>
            <div className="livestrip__cell">
              <div className="livestrip__num">{setsLogged.toLocaleString()}</div>
              <div className="livestrip__lbl">Sets Logged · 30d</div>
              <div className="livestrip__delta">+2.4 / sec</div>
            </div>
            <div className="livestrip__cell">
              <div className="livestrip__num">
                86.4<span style={{ fontSize: '60%', color: 'var(--color-muted)' }}>%</span>
              </div>
              <div className="livestrip__lbl">First-Set Success</div>
              <div className="livestrip__delta">↑ 1.2pp vs last week</div>
            </div>
            <div className="livestrip__cell">
              <div className="livestrip__num">$0</div>
              <div className="livestrip__lbl">Cost · Forever</div>
              <div className="livestrip__delta">no paid tier</div>
            </div>
          </div>
        );
      }
