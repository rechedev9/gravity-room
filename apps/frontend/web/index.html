<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#c8a84e" />
    <!-- CSP is served as a response header by Vercel; see the `headers` block in vercel.json. -->
    <link rel="icon" type="image/webp" href="/favicon.webp" />
    <title>Gravity Room — Planes de fuerza gratis con progresión automática</title>
    <meta
      name="description"
      content="Deja de adivinar en el gimnasio. Programas de entrenamiento con progresión automática de peso, series y repeticiones. 100% gratis."
    />
    <!-- Canonical is set per-route by useHead; this default covers the root -->
    <link rel="canonical" href="https://gravityroom.app/" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/logo-192.webp" />

    <!-- Warm up the cross-origin API connection (DNS + TLS) before the first
         catalog/auth fetch. api.gravityroom.app is a separate subdomain. -->
    <link rel="preconnect" href="https://api.gravityroom.app" crossorigin />
    <link rel="dns-prefetch" href="https://api.gravityroom.app" />
    <meta name="robots" content="index, follow" />

    <!-- hreflang is set per-route by useHead (landing ES `/` + EN `/en` only).
         It is intentionally NOT static here: a static set would leak onto every
         prerendered page (program/legal) and falsely advertise the landing as
         their language alternate. -->

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="es_ES" />
    <meta property="og:url" content="https://gravityroom.app/" />
    <meta property="og:site_name" content="Gravity Room" />
    <meta
      property="og:title"
      content="Gravity Room — Planes de fuerza gratis con progresión automática"
    />
    <meta
      property="og:description"
      content="Deja de adivinar en el gimnasio. Programas de entrenamiento con progresión automática de peso, series y repeticiones. 100% gratis."
    />
    <meta property="og:image" content="https://gravityroom.app/og-image.webp" />
    <meta property="og:image:type" content="image/webp" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Gravity Room — training tracker with automatic weight progression"
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:image" content="https://gravityroom.app/og-image.webp" />
    <meta
      name="twitter:title"
      content="Gravity Room — Planes de fuerza gratis con progresión automática"
    />
    <meta
      name="twitter:description"
      content="Deja de adivinar en el gimnasio. Programas de entrenamiento con progresión automática de peso, series y repeticiones. 100% gratis."
    />

    <!-- Self-hosted fonts (no Google Fonts CDN — GDPR compliant, zero external DNS) -->
    <link
      rel="preload"
      href="/fonts/bebas-neue-400.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link rel="preload" href="/fonts/barlow-400.woff2" as="font" type="font/woff2" crossorigin />

    <!-- JSON-LD: WebSite (enables site name in search results) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Gravity Room",
        "url": "https://gravityroom.app"
      }
    </script>

    <!-- JSON-LD: Organization (brand entity — logo + social profiles) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Gravity Room",
        "url": "https://gravityroom.app",
        "logo": "https://gravityroom.app/logo.webp",
        "sameAs": ["https://github.com/rechedev9/gravity-room", "https://discord.gg/FXNBrgYf7U"]
      }
    </script>

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Gravity Room",
        "url": "https://gravityroom.app",
        "applicationCategory": "HealthApplication",
        "applicationSubCategory": "Fitness",
        "operatingSystem": "Web",
        "browserRequirements": "Requires a modern web browser",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "description": "Free web app for structured weightlifting programs with automatic progression. Tells you exactly what to lift each session and adjusts weight, sets, and reps based on your performance.",
        "screenshot": "https://gravityroom.app/og-image.webp",
        "featureList": "Automatic weight progression, Linear progression GZCLP, Multiple training programs, Statistics and strength curves, Cloud sync, Calendar integration, Offline PWA support",
        "inLanguage": ["en", "es"],
        "sameAs": ["https://github.com/rechedev9/gravity-room", "https://discord.gg/FXNBrgYf7U"]
      }
    </script>

    <!--
      FAQPage JSON-LD is rendered per-route by the landing page components
      (apps/frontend/web/src/features/landing/faq-section.tsx) so it only
      appears on / and /en — never on /privacy, /cookies, /login, /programs/*,
      etc. Google's policy requires the rendered FAQ text to match the JSON-LD
      exactly; both consume `faq-content.ts` as a single source of truth.
    -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Fallback for non-JS crawlers (AI bots, search engines, accessibility tools) -->
    <noscript>
      <div style="max-width: 800px; margin: 0 auto; padding: 40px 20px; font-family: sans-serif">
        <h1>Gravity Room — Planes de fuerza gratis con progresión automática</h1>
        <p>
          Stop guessing at the gym. Follow proven programs that automatically adjust weight, sets,
          and reps — so every session moves you forward.
        </p>
        <p>
          Deja de adivinar en el gimnasio. Sigue programas probados que ajustan automáticamente el
          peso, series y repeticiones — para que cada sesión te haga avanzar.
        </p>

        <h2>Features / Características</h2>
        <ul>
          <li>
            <strong>Smart Progression / Progresión Inteligente</strong> — The app decides when to
            add weight and how to handle failure.
          </li>
          <li>
            <strong>Proven Programs / Programas Probados</strong> — Science-backed training with
            structured periodization.
          </li>
          <li>
            <strong>Stats &amp; Charts / Estadísticas y Gráficas</strong> — See your strength curve
            over time.
          </li>
          <li>
            <strong>Cloud Sync / Sincronización en la Nube</strong> — Your data syncs automatically
            across devices.
          </li>
        </ul>

        <h2>Programs / Programas Disponibles</h2>
        <ul>
          <li><a href="/programs/gzclp">GZCLP</a></li>
          <li><a href="/programs/stronglifts-5x5">StrongLifts 5x5</a></li>
          <li><a href="/programs/phraks-greyskull-lp">Phrak's Greyskull LP</a></li>
          <li><a href="/programs/531-boring-but-big">5/3/1 Boring But Big</a></li>
          <li><a href="/programs/531-for-beginners">5/3/1 for Beginners</a></li>
          <li><a href="/programs/phul">PHUL</a></li>
          <li><a href="/programs/hexan-ppl">Hexan PPL</a></li>
        </ul>

        <p>
          <a href="/en">English version</a> ·
          <a href="/privacy">Privacy Policy / Política de Privacidad</a> ·
          <a href="/cookies">Cookies</a>
        </p>
      </div>
    </noscript>
  </body>
</html>
