line-length = 100
target-version = "py312"

[lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]  # don't fight existing long lines on first run

[lint.isort]
# Treat local application modules as first-party so isort doesn't flag
# bare imports like `from compute import ...` as mis-ordered third-party.
known-first-party = ["compute", "config", "db", "queries", "scheduler", "insights", "ml"]
