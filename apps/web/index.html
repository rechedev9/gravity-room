    <!-- JSON-LD: FAQPage (high-value for AI answer engines + Google rich snippets) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is Gravity Room?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Gravity Room is a free web app for structured weightlifting programs with automatic progression. It tells you exactly what to lift each session and adjusts weight, sets, and reps based on your performance. No spreadsheets, no guessing."
            }
          },
          {
            "@type": "Question",
            "name": "What is GZCLP?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "GZCLP is a linear progression weightlifting program that uses a tier system (T1, T2, T3) with different set/rep schemes per tier. When you fail a lift, the program automatically adjusts through stages before deloading, keeping you progressing longer than simple 5x5 programs."
            }
          },
          {
            "@type": "Question",
            "name": "Is Gravity Room free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes, Gravity Room is 100% free. All features including cloud sync, strength statistics, and all training programs are available at no cost — no premium tier, no ads."
            }
          },
          {
            "@type": "Question",
            "name": "How does automatic progression work?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "When you complete all prescribed reps for a lift, the app automatically increases the weight for next session. If you fail, the program adapts by changing the set/rep scheme (e.g., from 5x3 to 6x2) before eventually deloading. This is based on the progressive overload principle."
            }
          },
          {
            "@type": "Question",
            "name": "What is progressive overload?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Progressive overload is the gradual increase of stress placed on the body during exercise. For weightlifting, this means consistently adding more weight, reps, or sets over time. It is the foundational principle behind all effective strength training programs."
            }
          },
          {
            "@type": "Question",
            "name": "What is the best beginner weightlifting program?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "For beginners, GZCLP and StrongLifts 5x5 are two of the most recommended programs. GZCLP has a more nuanced progression system with tier-based exercises, while StrongLifts 5x5 is simpler with alternating A/B workouts. Both are available in Gravity Room with automatic progression tracking."
            }
          },
          {
            "@type": "Question",
            "name": "GZCLP vs StrongLifts 5x5 — which is better?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "GZCLP handles progression failures more intelligently through a staged system (5x3 → 6x2 → deload) before resetting weight, so you progress longer. StrongLifts 5x5 resets weight by 10% after three failed attempts. GZCLP also uses a three-tier exercise structure that trains more muscle groups per session. For most beginners, GZCLP is the better long-term choice."
            }
          },
          {
            "@type": "Question",
            "name": "How do I track gym progress effectively?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "The most effective way to track gym progress is to log every workout with weights, sets, and reps, and follow a structured program with built-in progression rules. Apps like Gravity Room automate this — they tell you what to lift and automatically increase the weight when you hit your targets."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué es Gravity Room?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Gravity Room es una app web gratuita para seguir programas de entrenamiento con progresión automática. Te dice exactamente qué levantar en cada sesión y ajusta el peso, series y repeticiones según tu rendimiento. Sin hojas de cálculo, sin adivinar."
            }
          },
          {
            "@type": "Question",
            "name": "¿Qué es GZCLP?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "GZCLP es un programa de progresión lineal que usa un sistema de tiers (T1, T2, T3) con diferentes esquemas de series y repeticiones por tier. Cuando fallas un levantamiento, el programa ajusta automáticamente las etapas antes de hacer deload, manteniéndote progresando más tiempo."
            }
          },
          {
            "@type": "Question",
            "name": "¿Gravity Room es gratis?",
            "acceptedAnswer": {
              "@type": "Answer",

            }
          }
        ]
