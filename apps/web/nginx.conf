server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Guard for browsers that cached the old SW registration — removable once client caches expire
    location = /service-worker.js {
        return 404;
    }

    # SPA fallback — all routes serve index.html
    # No-cache headers ensure deployments take effect immediately
    location / {
        try_files $uri $uri.html $uri/ /index.html;
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        include /etc/nginx/security-headers.conf;
    }

    # Long cache for hashed static assets (Vite outputs to /assets/)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        include /etc/nginx/security-headers.conf;
    }

    # Long cache for fonts/images served from root (fonts/, hero.webp, logo*.webp,
    # favicon.webp, og-image.webp). These are content-addressed by filename and
    # updated via deploy, so they're safe to cache immutably.
    location ~* \.(woff2|webp|png|svg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        include /etc/nginx/security-headers.conf;
    }

    # Compression is handled at the Caddy edge layer (zstd + gzip) so nginx
    # returns uncompressed bytes — Caddy then picks the best encoding per
    # client Accept-Encoding. Do NOT re-enable gzip here; it would force
    # gzip-only responses and prevent zstd at the edge.

    # Security headers (inherited by locations without their own add_header)
    include /etc/nginx/security-headers.conf;
}
