# Gitleaks configuration for Gravity Room.
#
# Extends the upstream default ruleset and adds a narrow allowlist for values
# that look like secrets to the generic `generic-api-key` heuristic but are
# either public by design or test fixtures. Without this, the Security workflow
# fails on every push to `main` and on the weekly schedule, because those events
# scan the FULL git history (not just a PR's commit range) and re-flag these
# long-lived false positives.
#
# IMPORTANT: this file is only honoured when gitleaks is pointed at it. The
# secret-scan job runs gitleaks in a container whose working directory is `/`,
# not the mounted `/repo`, so gitleaks cannot auto-discover this file — the
# workflow MUST pass `--config=/repo/.gitleaks.toml`. See the `secret-scan`
# job in `.github/workflows/ci.yml`.
[extend]
useDefault = true

[allowlist]
description = "Project-wide false positives: the public IndexNow key and test/storage fixtures."

# The IndexNow verification key. Public by design: it is served at the site root
# (apps/frontend/web/public/<key>.txt) so Bing/IndexNow can verify domain
# ownership, and it is duplicated in the SEO scripts that submit URLs. It is not
# a credential and grants no access. Allowlisted as a regex so it is permitted
# in EVERY file and historical commit it appears in (the .txt key file, plus
# scripts/seo-config.ts and scripts/indexnow-ping.ts).
regexes = [
  '''a3f8e1c97b6d452e8f0a1b2c3d4e5f60''',
]

# Paths whose contents are fixtures or non-secret constants, not credentials.
paths = [
  # The served IndexNow key file (kept for clarity even though the regex covers it).
  '''apps/frontend/web/public/a3f8e1c97b6d452e8f0a1b2c3d4e5f60\.txt''',
  # Auth tests embed fake, non-functional JWTs (header/payload/signature triples
  # like `eyJ...`) as fixtures; the generic-api-key/JWT rules flag them. The
  # `apps/api/` / `apps/web/` variants cover the pre-restructure monorepo layout,
  # which full-history scans (push events) still walk through.
  '''apps/backend/api/src/lib/google-auth\.test\.ts''',
  '''apps/backend/api/src/routes/auth-dev\.test\.ts''',
  '''apps/api/src/lib/google-auth\.test\.ts''',
  # localStorage key NAMES (not secret values) that trip the high-entropy
  # heuristic, e.g. SHORTCUTS_STORAGE_KEY / guest-storage keys.
  '''apps/frontend/web/src/features/tracker/shortcuts-storage\.ts''',
  '''apps/web/src/lib/guest-storage\.ts''',
  # Planning/design docs in the agent superpowers archive contain illustrative
  # token-shaped strings in prose and code blocks.
  '''docs/superpowers/.*''',
]
