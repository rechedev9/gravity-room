# Gitleaks configuration for Gravity Room.
# Extends the upstream default ruleset and only adds a narrow allowlist for
# values that look like secrets but are public by design.
[extend]
useDefault = true

[allowlist]
description = "IndexNow verification key. It is public by design: served at the site root (apps/frontend/web/public/<key>.txt) so Bing/IndexNow can verify domain ownership, and embedded in the SEO scripts that submit URLs. It is not a credential and grants no access."
regexes = ['''a3f8e1c97b6d452e8f0a1b2c3d4e5f60''']
paths = ['''apps/frontend/web/public/a3f8e1c97b6d452e8f0a1b2c3d4e5f60\.txt''']
