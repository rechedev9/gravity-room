pre-commit:
  parallel: true
  commands:
    typecheck:
      run: bun run typecheck
    lint:
      run: bun run lint
    format:
      run: bun run format:check
    go-vet:
      root: apps/go-api
      run: go vet ./...
    go-build:
      root: apps/go-api
      run: go build ./cmd/api

pre-push:
  commands:
    test:
      run: bun run test
    build:
      run: VITE_API_URL=http://localhost:3001 bun run build
    go-test:
      root: apps/go-api
      run: go test ./...
