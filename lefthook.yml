pre-commit:
  parallel: true
  commands:
    typecheck:
      run: bun run typecheck
    lint:
      run: bun run lint
    format:
      run: bun run format:check
    api-typecheck:
      root: apps/backend/api
      run: bun run typecheck

pre-push:
  commands:
    test:
      run: bun run test
    build:
      run: VITE_API_URL=http://localhost:3001 bun run build

# api-types-drift is intentionally NOT a git hook: it requires a live API on
# http://localhost:3001/swagger/json that nobody has running locally before
# pushing — every push without the dev stack up would be rejected.
#
# It now runs in CI instead: the `api-types-drift` job in
# .github/workflows/ci.yml boots the API via the pure createApp() factory (no
# Postgres or Redis needed for /swagger/json), runs `bun run --filter web
# api:types`, and fails on `git diff --exit-code
# apps/frontend/web/src/lib/api/generated.ts`. To regenerate locally whenever an
# API contract changes (with the API running on :3001):
#   bun run --filter web api:types
#   git diff --exit-code apps/frontend/web/src/lib/api/generated.ts
