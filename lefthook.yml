pre-commit:
  parallel: true
  commands:
    typecheck:
      run: bun run typecheck
    lint:
      run: bun run lint
    format:
      run: bun run format:check
    go-vet:
      root: apps/go-api
      run: go vet ./...
    go-lint:
      root: apps/go-api
      run: golangci-lint run ./...
    go-build:
      root: apps/go-api
      run: go build ./...

pre-push:
  commands:
    test:
      run: bun run test
    build:
      run: VITE_API_URL=http://localhost:3001 bun run build
    go-test:
      root: apps/go-api
      run: go test ./...
    api-types-drift:
      root: apps/web
      run: bun run api:types && git diff --exit-code src/lib/api/generated.ts
