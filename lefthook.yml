min_version: 2.1.5

# Reduce noise: include only the output sections that surface real signal.
# `meta`, `success`, and `skips` are intentionally omitted so passing parallel
# commands stay quiet — failures and the final summary still print.
output:
  - summary
  - failure
  - execution
  - execution_info
  - execution_out

pre-commit:
  parallel: true
  commands:
    typecheck:
      glob: '*.{ts,tsx,mts,cts}'
      run: bun run typecheck
    lint:
      glob: '*.{ts,tsx,mts,cts}'
      run: bun run lint
    format:
      # No glob: prettier --check . is fast and covers JSON/MD/YML drift.
      # {staged_files} would miss unstaged formatting drift, so we keep it
      # repo-wide.
      run: bun run format:check
    api-typecheck:
      root: apps/backend/api
      glob: '*.{ts}'
      run: bun run typecheck

pre-push:
  parallel: true
  commands:
    test:
      run: bun run test
    build:
      run: bun run build:ci

# api-types-drift was removed from pre-push because it requires a live API on
# http://localhost:3001/swagger/json that nobody has running locally before
# pushing — every push without the dev stack up was rejected.
#
# The check now lives in .github/workflows/validate.yml as a step inside the
# `validate` job, booting the API against a Postgres service container and
# diffing apps/frontend/web/src/lib/api/generated.ts via `git diff --exit-code`.
