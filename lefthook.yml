min_version: 2.1.5

# Reduce noise: include only the output sections that surface real signal.
# `meta`, `success`, and `skips` are intentionally omitted so passing parallel
# commands stay quiet — failures and the final summary still print.
output:
  - summary
  - failure
  - execution
  - execution_info
  - execution_out

pre-commit:
  parallel: true
  commands:
    typecheck:
      glob: '*.{ts,tsx,mts,cts}'
      run: pnpm run typecheck
    lint:
      glob: '*.{ts,tsx,mts,cts}'
      run: pnpm run lint
    format:
      # No glob: prettier --check . is fast and covers JSON/MD/YML drift.
      # {staged_files} would miss unstaged formatting drift, so we keep it
      # repo-wide.
      run: pnpm run format:check
    api-typecheck:
      root: apps/backend/api
      glob: '*.{ts}'
      run: pnpm run typecheck
    security-headers:
      # Assert vercel.json's SPA security headers still match the hardened
      # policy. Only runs when the config or the check itself is staged; it
      # reads vercel.json alone (no server/DB), so it is cheap and offline.
      glob: '{vercel.json,scripts/check-security-headers.ts}'
      run: pnpm run security:headers

pre-push:
  parallel: true
  commands:
    test:
      run: pnpm run test
    build:
      # Build WITHOUT the Playwright prerender. The prerender boots headless
      # Chromium, which is environment-fragile locally (Chromium launch timeouts
      # on Windows repeatedly blocked pushes). CI's `build-web` job runs the full
      # build + prerender on a clean runner and gates the deploy, so pre-push only
      # needs `vite build` to catch real build/TS breakage fast and reliably.
      run: pnpm run build:ci:no-prerender

# api-types-drift was removed from pre-push because it requires a live API on
# http://localhost:3001/swagger/json that nobody has running locally before
# pushing — every push without the dev stack up was rejected.
#
# The check lives in .github/workflows/ci.yml as the `api-types-drift` job:
# it boots the API with a dummy DATABASE_URL (swagger serves without a DB),
# regenerates the client, and diffs
# apps/frontend/web/src/lib/api/generated.ts via `git diff --exit-code`.
